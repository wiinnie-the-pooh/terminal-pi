name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        # Node 18 is excluded: @vscode/vsce@3 depends on undici which
        # references the File global unavailable in Node 18.
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile TypeScript
        run: npm run compile

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-node${{ matrix.node-version }}
          path: coverage/

      - name: Coverage summary
        shell: bash
        run: |
          echo '### Coverage Summary (${{ matrix.os }}, Node ${{ matrix.node-version }})' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          npx c8 report --reporter=text >> $GITHUB_STEP_SUMMARY

      - name: Diff coverage
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          pip install diff-cover
          echo '### Diff Coverage (vs origin/main)' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          diff-cover coverage/lcov.info --compare-branch=origin/main --markdown-report=- --fail-under=80 >> $GITHUB_STEP_SUMMARY

      - name: Package extension
        run: npm run package

  devcontainer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Build and test Dev Container
        run: |
          devcontainer up --workspace-folder . --remove-existing-container
          devcontainer exec --workspace-folder . bash -c "node --version && npm --version && npm run lint && npm run compile && npm test && npm run diff-coverage"
        env:
          DOCKER_BUILDKIT: 1
